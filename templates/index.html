<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendly - Smart Attendance Platform</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1e1e2f; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #2a2a40; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .btn-group { display: flex; gap: 20px; margin-top: 30px; }
        a { text-decoration: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; font-size: 16px; color: white; transition: 0.3s; }
        .btn-prof { background-color: #4CAF50; }
        .btn-student { background-color: #2196F3; }
        a:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="font-size: 36px; margin-bottom: 10px;">Welcome to Attendly</h1>
        <p style="color: #aaa;">Zero-Touch Biometric Attendance System</p>
        
        <div class="btn-group">
            <a href="/professor" class="btn-prof"> Professor Login</a>
            <a href="/app" class="btn-student"> Student Check-In</a>
        </div>
    </div>
</body>
</html>
