<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendly - Secure Check-In</title>
    <!-- Load face-api.js for client-side liveness detection -->
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        video { width: 100%; border-radius: 8px; background-color: #000; margin-bottom: 15px; transform: scaleX(-1); } /* Mirrored for a natural selfie feel */
        button { background-color: #4CAF50; color: white; border: none; padding: 15px 20px; font-size: 16px; border-radius: 8px; width: 100%; font-weight: bold; transition: 0.3s; }
        button:disabled { background-color: #cccccc; color: #666; cursor: not-allowed; }
        .status-text { margin-top: 10px; font-weight: bold; font-size: 14px;}
        .pending { color: #f44336; }
        .passed { color: #4CAF50; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Secure Check-In</h2>
        <p>1. Be quiet so the mic can hear the room.<br>2. Smile at the camera to prove you are real.</p>
        
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none;"></canvas>
        
        <p id="audio-status" class="status-text pending">🎙️ Waiting for Classroom Audio Token...</p>
        <p id="liveness-status" class="status-text pending">😐 Waiting for Liveness (Please Smile)...</p>
        
        <button id="snap-btn" disabled>Locks Active. Waiting...</button>
        <p id="server-status" class="status-text"></p>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snapBtn = document.getElementById('snap-btn');
        const audioStatus = document.getElementById('audio-status');
        const livenessStatus = document.getElementById('liveness-status');
        const serverStatus = document.getElementById('server-status');

        let isAudioVerified = false;
        let isLivenessVerified = false;
        const TARGET_FREQUENCY = 19000;

        // --- INIT ALL SYSTEMS ---
        Promise.all([
            // Load the ML models from our FastAPI server
            faceapi.nets.tinyFaceDetector.loadFromUri('/models'),
            faceapi.nets.faceExpressionNet.loadFromUri('/models')
        ]).then(startCamera);

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true })
                .then(stream => { 
                    video.srcObject = stream; 
                    startAudioListener(stream);
                })
                .catch(err => alert("Camera/Mic access is required for attendance."));
        }

        // --- SECURITY LOCK 1: ULTRASONIC LISTENER ---
        function startAudioListener(stream) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioCtx.createAnalyser();
            const microphone = audioCtx.createMediaStreamSource(stream);
            microphone.connect(analyser);
            analyser.fftSize = 2048; 
            
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            const binIndex = Math.round((TARGET_FREQUENCY * analyser.fftSize) / audioCtx.sampleRate);

            function checkAudio() {
                if (isAudioVerified) return;
                analyser.getByteFrequencyData(dataArray);
                if (dataArray[binIndex] > 100) { // Threshold for 19kHz volume
                    isAudioVerified = true;
                    audioStatus.innerText = "✅ Audio Token Verified!";
                    audioStatus.className = "status-text passed";
                    checkUnlockStatus();
                } else {
                    requestAnimationFrame(checkAudio);
                }
            }
            checkAudio();
        }

        // --- SECURITY LOCK 2: LIVENESS (SMILE) DETECTOR ---
        video.addEventListener('play', () => {
            const livenessCheck = setInterval(async () => {
                if (isLivenessVerified) {
                    clearInterval(livenessCheck);
                    return;
                }

                // Scan the video feed for faces and expressions
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();
                
                if (detections.length > 0) {
                    // If the 'happy' expression confidence is over 80%
                    if (detections[0].expressions.happy > 0.8) {
                        isLivenessVerified = true;
                        livenessStatus.innerText = "✅ Liveness Verified! (Smile Detected)";
                        livenessStatus.className = "status-text passed";
                        checkUnlockStatus();
                    }
                }
            }, 500); // Check every half second
        });

        // --- UNLOCK & CHECK-IN LOGIC ---
        function checkUnlockStatus() {
            if (isAudioVerified && isLivenessVerified) {
                snapBtn.innerText = "Systems Go. Click to Log Attendance";
                snapBtn.disabled = false;
                snapBtn.style.backgroundColor = "#2196F3"; // Turn blue to indicate ready
            }
        }

        snapBtn.addEventListener('click', async () => {
            serverStatus.innerText = "Uploading to server...";
            serverStatus.style.color = "blue";
            snapBtn.disabled = true;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('image', blob, 'selfie.jpg');
                formData.append('audio_token', 'CS101-May03'); // The token physically verified by audio

                try {
                    const response = await fetch('/mark_attendance', { method: 'POST', body: formData });
                    const result = await response.json();

                    if (result.status === "success") {
                        serverStatus.innerText = `✅ Success: ${result.name} - ${result.message}`;
                        serverStatus.className = "status-text passed";
                    } else {
                        serverStatus.innerText = `❌ Failed: ${result.message}`;
                        serverStatus.className = "status-text pending";
                        snapBtn.disabled = false; 
                    }
                } catch (error) {
                    serverStatus.innerText = "❌ Network Error.";
                }
            }, 'image/jpeg');
        });
    </script>
</body>
</html>
